[bar]
order = [ "sidebar" ]

    [bar.sidebar]
    background_opacity = 0.73999998345971107
    capsule_thickness = 0.61999998986721039
    center = [ "audio_visualizer", "clock", "temp", "cpu", "ram" ]
    end = [ "media", "tray", "network", "bluetooth", "volume", "battery", "session" ]
    margin_ends = 0
    position = "left"
    radius_top_left = 0
    scale = 1.2500000111758709
    start = [ "launcher", "workspaces", "active_window" ]
    thickness = 46
    widget_spacing = 12

[control_center]
sidebar = "full"
sidebar_section = "full"

[dock]
background_opacity = 1.0

[location]
address = "Melbourne, Australia"

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@eDP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 960.0
    cy = 961.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        center_password_text = false
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[notification]
background_opacity = 1.0

[osd]
background_opacity = 1.0

[settings]

[shell]
font_family = "DejaVu Sans"
lang = "en"
password_style = "random"
polkit_agent = true

    [shell.panel]
    open_near_click_control_center = true

    [shell.screenshot]
    confirm_region = true
    directory = "~/Pictures/Screenshots"

[theme]
custom_palette = "stylix"
mode = "dark"
source = "custom"

[wallpaper]
directory = "/home/mckahz/Pictures/wallpapers"

    [wallpaper.default]
    path = "/home/mckahz/Pictures/wallpapers/b-374.jpg"

    [wallpaper.last]
    path = "/home/mckahz/Pictures/wallpapers/b-374.jpg"

[widget.active_window]
icon_size = 22

[widget.battery]
show_label = false

[widget.brightness]
show_label = false

[widget.clock]
anchor = true
capsule = true
capsule_fill = "primary"
capsule_padding = 12
color = "on_primary"
timezone = "Australia/Melbourne"
vertical_format = "{:%H\\n%M}"

[widget.cpu]
icon_color = "secondary"
show_label = false

[widget.network]
show_label = false

[widget.ram]
icon_color = "secondary"
show_label = false
stat = "ram_pct"

[widget.sysmon]
icon_color = "secondary"
show_label = false

[widget.temp]
icon_color = "secondary"
show_label = false

[widget.volume]
show_label = false

[widget.workspaces]
scale = 1.25
